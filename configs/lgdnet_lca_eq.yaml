project: lgdnet-lca-eq
seed: 42

environment:
  python: ">=3.10"
  torch: "2.7.1"
  torchvision: "0.22.1"

data:
  root: data/lca_eq
  split_name: paper_scene_split
  train_manifest: data/lca_eq/splits/paper_scene_split/train.csv
  val_manifest: data/lca_eq/splits/paper_scene_split/val.csv
  test_manifest: data/lca_eq/splits/paper_scene_split/test.csv
  image_size: 384
  num_land_classes: 7
  ignore_index: 255
  remap_land_labels: true
  hard_negative_events:
    - southwest_puerto_rico_2020

model:
  name: LGDNet
  backbone: resnet101
  pretrained_backbone: true
  decoder_channels: 448
  transformer_layers: 2
  mamba_decoder: true
  use_lsgm: true
  host_class_ids: [0, 1, 2]
  non_host_class_ids: [3, 4, 5, 6]

paper_reported_efficiency:
  parameters_m: 60.67
  flops_g: 505.95
  fps: 9.93
  note: "Reported in the manuscript efficiency table for the paper LGDNet implementation."

loss:
  damage_weight: 1.0
  land_weight: 0.5
  damage_class_weights: [0.5049, 51.2585]
  land_class_weights: [1.6963, 2.5613, 1.6376, 0.4630, 2.1080, 0.8263, 0.6390]

optimizer:
  name: AdamW-Lookahead
  pretrained_lr: 0.00006
  new_lr: 0.0006
  weight_decay: 0.01
  lookahead_k: 5
  lookahead_alpha: 0.5

scheduler:
  name: cosine
  min_lr: 0.000001

augmentation:
  scale_jitter: [0.75, 1.25]
  horizontal_flip: true
  vertical_flip: true
  normalize: true
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

train:
  epochs: 30
  batch_size: 8
  val_batch_size: 8
  patience: 15
  num_workers: 4
  output_dir: outputs/lgdnet_lca_eq
  monitor: val_combined_F1

eval:
  damage_threshold: 0.75
