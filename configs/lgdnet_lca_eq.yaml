project: lgdnet-lca-eq
seed: 42

environment:
  python: ">=3.10"
  pytorch: "2.7.1"

data:
  train_manifest: data/lca_eq/splits/train_manifest.csv
  val_manifest: data/lca_eq/splits/val_manifest.csv
  test_manifest: data/lca_eq/splits/test_manifest.csv
  image_size: 384
  source_patch_size: 1024
  num_land_classes: 7
  ignore_index: 255

model:
  name: LGDNet
  backbone_channels: [64, 128, 256]
  decoder_channels: 128
  use_lsgm: true
  support_class_ids: [0, 1, 2]
  non_support_class_ids: [3, 4, 5, 6]

loss:
  damage_weight: 1.0
  land_weight: 0.5
  damage_class_weights: [1.0, 50.0]

optimizer:
  name: AdamW
  backbone_lr: 0.0001
  head_lr: 0.001
  weight_decay: 0.01

scheduler:
  name: cosine
  min_lr: 0.000001

train:
  epochs: 30
  batch_size: 16
  patience: 10
  num_workers: 4
  output_dir: outputs/lgdnet_lca_eq
